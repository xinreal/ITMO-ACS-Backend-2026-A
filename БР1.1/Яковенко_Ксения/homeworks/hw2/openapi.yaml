openapi: 3.0.3
info:
  title: Fitness Training & Health Platform API
  version: 1.0.0
  description: REST API for a fitness training and health platform. The API covers authentication, user profile, workouts,
    training plans, progress tracking, workout sessions, body metrics, and blog content.
servers:
- url: https://api.fitness-platform.example/v1
  description: Production server
tags:
- name: Auth
  description: Registration and login
- name: Users
  description: Current user and profile
- name: Metadata
  description: 'Reference data: workout types, difficulty levels, blog categories'
- name: Workouts
  description: Workout catalog and workout management
- name: Training Plans
  description: Training plan catalog, enrollment, and user plan tracking
- name: Workout Sessions
  description: Executed workouts and activity history
- name: Body Metrics
  description: Body measurements history
- name: Blog
  description: Health and nutrition blog
security:
- bearerAuth: []
paths:
  /auth/register:
    post:
      tags:
      - Auth
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
      - Auth
      summary: Log in and receive JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    get:
      tags:
      - Users
      summary: Get current user account and profile
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/profile:
    patch:
      tags:
      - Users
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /metadata/difficulty-levels:
    get:
      tags:
      - Metadata
      summary: List difficulty levels
      security: []
      responses:
        '200':
          description: Difficulty levels list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DifficultyLevelListResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /metadata/workout-types:
    get:
      tags:
      - Metadata
      summary: List workout types
      security: []
      responses:
        '200':
          description: Workout types list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutTypeListResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /blog/categories:
    get:
      tags:
      - Blog
      summary: List blog categories
      security: []
      responses:
        '200':
          description: Blog categories list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogCategoryListResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /workouts:
    get:
      tags:
      - Workouts
      summary: Search and filter workouts
      security: []
      parameters:
      - name: q
        in: query
        schema:
          type: string
        description: Text search by title or description
      - name: difficultyLevelId
        in: query
        schema:
          type: integer
          format: int64
      - name: typeIds
        in: query
        schema:
          type: array
          items:
            type: integer
            format: int64
        style: form
        explode: false
        description: Comma-separated workout type IDs
      - name: durationMinFrom
        in: query
        schema:
          type: integer
          minimum: 1
      - name: durationMinTo
        in: query
        schema:
          type: integer
          minimum: 1
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: sortBy
        in: query
        schema:
          type: string
          enum:
          - createdAt
          - durationMin
          - title
      - name: sortOrder
        in: query
        schema:
          type: string
          enum:
          - asc
          - desc
      responses:
        '200':
          description: Workout search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Workouts
      summary: Create workout (trainer/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
      responses:
        '201':
          description: Workout created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /workouts/{workoutId}:
    get:
      tags:
      - Workouts
      summary: Get workout details
      security: []
      parameters:
      - name: workoutId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Workout details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutResponse'
        '404':
          description: Workout not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
      - Workouts
      summary: Update workout (trainer/admin)
      parameters:
      - name: workoutId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkoutRequest'
      responses:
        '200':
          description: Workout updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Workouts
      summary: Delete workout (trainer/admin)
      parameters:
      - name: workoutId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '204':
          description: Workout deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /training-plans:
    get:
      tags:
      - Training Plans
      summary: List training plans
      security: []
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - name: difficultyLevelId
        in: query
        schema:
          type: integer
          format: int64
      - name: durationWeeksFrom
        in: query
        schema:
          type: integer
          minimum: 1
      - name: durationWeeksTo
        in: query
        schema:
          type: integer
          minimum: 1
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Training plans list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Training Plans
      summary: Create training plan (trainer/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrainingPlanRequest'
      responses:
        '201':
          description: Training plan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /training-plans/{planId}:
