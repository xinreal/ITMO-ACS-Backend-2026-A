        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Body Metrics
      summary: Create body metrics record for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBodyMetricRequest'
      responses:
        '201':
          description: Body metrics record created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyMetricResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
