components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          example: RESOURCE_NOT_FOUND
        message:
          type: string
          example: Requested resource was not found
        details:
          type: object
          additionalProperties: true
          nullable: true
    ValidationErrorResponse:
      allOf:
      - $ref: '#/components/schemas/ErrorResponse'
      - type: object
        properties:
          errors:
            type: array
            items:
              $ref: '#/components/schemas/FieldValidationError'
    FieldValidationError:
      type: object
      required:
      - field
      - message
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: Must be a valid email address
    PaginationMeta:
      type: object
      required:
      - page
      - pageSize
      - totalItems
      - totalPages
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 120
        totalPages:
          type: integer
          example: 6
    User:
      type: object
      required:
      - id
      - email
      - role
      - status
      - createdAt
      properties:
        id:
          type: integer
          format: int64
          example: 101
        email:
          type: string
          format: email
          example: user@example.com
        role:
          type: string
          enum:
          - user
          - trainer
          - admin
          example: user
        status:
          type: string
          enum:
          - active
          - blocked
          example: active
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    Profile:
      type: object
      required:
      - userId
      properties:
        userId:
          type: integer
          format: int64
          example: 101
        firstName:
          type: string
          example: Ksenia
          nullable: true
        lastName:
          type: string
          example: Ivanova
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        heightCm:
          type: integer
          example: 168
          nullable: true
        fitnessGoal:
          type: string
          example: weight_loss
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true
        about:
          type: string
          nullable: true
    CurrentUserResponse:
      type: object
      required:
      - user
      - profile
      properties:
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/Profile'
    ProfileResponse:
      type: object
      required:
      - profile
      properties:
        profile:
          $ref: '#/components/schemas/Profile'
    RegisterRequest:
      type: object
      required:
      - email
      - password
      - firstName
      - lastName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          format: password
          description: At least 8 characters
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        birthDate:
          type: string
          format: date
          nullable: true
        heightCm:
          type: integer
          minimum: 50
          maximum: 300
          nullable: true
        fitnessGoal:
          type: string
          nullable: true
          example: weight_loss
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthResponse:
      type: object
      required:
      - accessToken
      - refreshToken
      - tokenType
      - expiresIn
      - user
      - profile
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: def50200...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/Profile'
