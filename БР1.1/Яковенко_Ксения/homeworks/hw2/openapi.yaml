      summary: Get training plan details
      security: []
      parameters:
      - name: planId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Training plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanResponse'
        '404':
          description: Training plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
      - Training Plans
      summary: Update training plan (trainer/admin)
      parameters:
      - name: planId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrainingPlanRequest'
      responses:
        '200':
          description: Training plan updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingPlanResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Training Plans
      summary: Delete training plan (trainer/admin)
      parameters:
      - name: planId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '204':
          description: Training plan deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /training-plans/{planId}/enroll:
    post:
      tags:
      - Training Plans
      summary: Enroll current user in a training plan
      parameters:
      - name: planId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollTrainingPlanRequest'
      responses:
        '201':
          description: Plan enrollment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTrainingPlanResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/training-plans:
    get:
      tags:
      - Training Plans
      summary: List current user training plans
      parameters:
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - completed
          - cancelled
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Current user plan enrollments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTrainingPlanListResponse'
        '401':
